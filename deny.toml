[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
unsound = "deny"
yanked = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
]
deny = []
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
skip-tree = [
    { name = "candle-transformers" },
    { name = "ort" },
    { name = "fastembed" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
