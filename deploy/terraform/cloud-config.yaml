#cloud-config
package_update: true
package_upgrade: true

packages:
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https
  - curl
  - libgomp1 # Required by ONNX Runtime for OpenMP multi-threading

runcmd:
  # Install Caddy
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - apt-get install caddy -y

  # Configure directories for Aletheia Engine
  - mkdir -p /var/lib/
  - chown -R ubuntu:ubuntu /var/lib/

  # Write Caddyfile (SSL automation)
  - |
    cat <<EOF > /etc/caddy/Caddyfile
    # REPLACE WITH YOUR ACTUAL DOMAIN OR IP
    # Make sure to update your DNS A-Record to point to the Azure VM public IP.
    engine.tellodb.com {
        reverse_proxy localhost:3000
    }
    EOF
  - systemctl restart caddy
